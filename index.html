<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fright Finder — Horror Movie Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --card-bg: #141414;
      --accent: #ff2b2b;
      --crimson: #8b0000;
      --text: #f5f5f5;
      --text-muted: #aaa;
      --text-dim: #666;
      --border: rgba(255,43,43,0.18);
      --border-hover: rgba(255,43,43,0.5);
      --gold: #ffc84a;
      --glow: rgba(255,43,43,0.35);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html { overflow-x: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* ─── HEADER ─────────────────────────────────────────────────────── */
    .header {
      background: rgba(8,8,8,0.97);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 40px rgba(139,0,0,0.25);
      width: 100%;
      box-sizing: border-box;
    }

    .header-content { max-width: 1400px; margin: 0 auto; }

    .header-main {
      display: grid;
      grid-template-columns: 1fr minmax(0, 800px) 200px;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 0.85rem;
    }

    .watchlist-btn-wrap {
      display: flex;
      justify-content: flex-end;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(255,43,43,0.6), 0 0 60px rgba(139,0,0,0.4);
      line-height: 1;
      animation: flicker 5s infinite;
      white-space: nowrap;
      flex-shrink: 0;
    }

    @keyframes flicker {
      0%,19%,21%,23%,25%,54%,56%,100% { opacity:1; text-shadow: 0 0 30px rgba(255,43,43,0.6), 0 0 60px rgba(139,0,0,0.4); }
      20%,24%,55% { opacity:0.82; text-shadow: 0 0 10px rgba(255,43,43,0.9), 2px 0 6px rgba(255,255,255,0.3); }
      22% { opacity:0.5; }
    }

    .logo span { color: var(--text); opacity: 0.5; font-size: 1.6rem; margin-left: 6px; }

    .watchlist-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(139,0,0,0.2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .watchlist-btn:hover {
      background: rgba(139,0,0,0.4);
      border-color: var(--accent);
    }

    .watchlist-count {
      background: var(--accent);
      color: #fff;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    /* ─── SEARCH BAR ─────────────────────────────────────────────────── */
    .search-row {
      display: flex;
      gap: 0.5rem;
      min-width: 0;
      width: 100%;
    }

    .search-wrapper {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    .search-input {
      width: 100%;
      display: block;
      background: #111;
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1.1rem;
      border-radius: 4px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,43,43,0.12);
    }

    .search-input::placeholder { color: #444; }

    .search-btn {
      margin-left: 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.75rem 1.75rem;
      border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 2px 16px rgba(255,43,43,0.35);
      flex-shrink: 0;
    }

    .search-btn:hover:not(:disabled) {
      background: #ff4444;
      box-shadow: 0 4px 24px rgba(255,43,43,0.55);
      transform: translateY(-1px);
    }

    .search-btn:disabled { background: #333; cursor: not-allowed; box-shadow: none; transform: none; }

    /* ─── AUTOCOMPLETE ───────────────────────────────────────────────── */

    .autocomplete-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #181818;
      border: 1px solid var(--border);
      border-radius: 4px;
      z-index: 999;
      max-height: 240px;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    }

    .autocomplete-item {
      padding: 0.65rem 1rem;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .autocomplete-item:hover, .autocomplete-item.selected {
      background: rgba(255,43,43,0.12);
    }

    .autocomplete-item .ac-year { color: var(--text-dim); font-size: 0.8rem; margin-left: auto; }

    /* ─── CATEGORY TABS ──────────────────────────────────────────────── */
    .categories {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 0.5rem;
    }

    .category-btn {
      background: rgba(20,20,20,0.9);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.55rem 0.5rem;
      border-radius: 4px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .category-btn:hover {
      background: rgba(139,0,0,0.3);
      border-color: var(--accent);
      color: var(--text);
    }

    .category-btn.active {
      background: rgba(139,0,0,0.5);
      border-color: var(--accent);
      color: var(--text);
    }

    /* ─── RESULTS ────────────────────────────────────────────────────── */
    .results-container {
      flex: 1;
      padding: 1.5rem 2rem 3rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .results-header {
      font-family: 'Crimson Pro', serif;
      font-size: 1.15rem;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    .results-header strong { color: var(--accent); font-style: italic; }

    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* ─── MOVIE CARD ─────────────────────────────────────────────────── */
    .movie-card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      display: flex;
      flex-direction: column;
    }

    .movie-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: var(--border-hover);
      box-shadow: 0 12px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,43,43,0.2);
    }

    .poster-wrap {
      position: relative;
      width: 100%;
      padding-top: 150%; /* 2:3 aspect */
      overflow: hidden;
      background: #111;
    }

    .poster-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.35s;
    }

    .movie-card:hover .poster-wrap img { transform: scale(1.04); }

    .poster-placeholder {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(160deg, #1a0000 0%, #111 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.3rem 0 0.5rem;
    }

    .rating-score {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--gold);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .fav-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
      z-index: 5;
    }

    .fav-btn:hover { background: rgba(139,0,0,0.7); border-color: var(--accent); }
    .fav-btn.active { background: rgba(139,0,0,0.85); border-color: var(--accent); color: var(--gold); }

    .movie-info { padding: 0.75rem 0.85rem; flex: 1; }

    .movie-title {
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 0.3rem;
    }

    .movie-meta {
      display: flex;
      gap: 0.6rem;
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
    }

    .movie-overview {
      font-size: 0.8rem;
      color: #888;
      line-height: 1.55;
    }

    .top-rated-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.68rem;
      color: var(--gold);
      background: rgba(255,200,74,0.1);
      border: 1px solid rgba(255,200,74,0.25);
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      margin-top: 0.4rem;
    }

    /* ─── WHERE TO WATCH ─────────────────────────────────────────────── */
    .streaming-section {
      padding: 0.6rem 0.85rem 0.85rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: auto;
    }

    .streaming-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.45rem;
    }

    .streaming-providers {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
    }

    .provider-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.15s, border-color 0.15s;
    }

    .provider-logo:hover {
      transform: scale(1.15);
      border-color: var(--accent);
    }

    .provider-tag {
      font-size: 0.7rem;
      color: #777;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      white-space: nowrap;
    }

    .provider-none {
      font-size: 0.72rem;
      color: #555;
      font-style: italic;
    }

    .provider-loading {
      font-size: 0.7rem;
      color: #444;
    }

    /* ─── LOAD MORE ──────────────────────────────────────────────────── */
    .load-more-btn {
      display: block;
      margin: 2.5rem auto 0;
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      padding: 0.8rem 3rem;
      border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .load-more-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 20px rgba(255,43,43,0.15);
    }

    /* ─── STATES ─────────────────────────────────────────────────────── */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.6rem;
      padding: 5rem 2rem;
    }

    .loading-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.3s infinite ease-in-out;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.15s; }
    .loading-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%,80%,100% { transform: scale(0.4); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    .empty-state {
      text-align: center;
      padding: 6rem 2rem;
      color: var(--text-dim);
    }

    .empty-state h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.06em;
      color: var(--crimson);
      margin-bottom: 0.75rem;
    }

    .empty-state p { font-size: 0.95rem; }

    /* ─── RESPONSIVE ─────────────────────────────────────────────────── */

    /* Tablet: 768px–1024px — 3 movie cards, 5-col tabs */
    @media (min-width: 769px) and (max-width: 1024px) {
      .movies-grid { grid-template-columns: repeat(3, 1fr); gap: 1rem; }
      .categories { grid-template-columns: repeat(5, 1fr); }
      .search-btn { margin-left: 0.5rem; }
    }

    /* Phone: up to 640px */
    @media (max-width: 640px) {
      .header { position: relative; padding: 0.75rem; }
      .header-content { width: 100%; }

      /* Stack everything vertically */
      .header-main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
        width: 100%;
        margin-bottom: 0.75rem;
      }

      /* Row 1: Logo centered */
      .logo { font-size: 1.6rem; text-align: center; }

      /* Row 2: Watchlist centered */
      .watchlist-btn-wrap { width: 100%; display: flex; justify-content: center; position: static; }
      .watchlist-btn { width: auto; padding: 0.5rem 1.5rem; font-size: 0.82rem; }

      /* Row 3: Search bar + button full width */
      .search-row { width: 100%; display: flex; gap: 0.5rem; }
      .search-wrapper { flex: 1; min-width: 0; }
      .search-input { width: 100%; padding: 0.65rem 0.75rem; font-size: 0.85rem; }
      .search-btn { flex-shrink: 0; margin-left: 0; padding: 0.65rem 1rem; font-size: 0.85rem; white-space: nowrap; }
      .btn-text::before { content: none; }
      .btn-text { font-size: inherit; }

      .categories { grid-template-columns: repeat(3, 1fr); gap: 0.35rem; width: 100%; }
      .category-btn { font-size: 0.72rem; padding: 0.45rem 0.2rem; white-space: normal; line-height: 1.2; text-align: center; }
      .results-container { padding: 0.75rem 0.6rem 3rem; }
      .movies-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
      .provider-logo { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <div class="header-main">
      <div class="logo">☠ Fright Finder <span>HORROR</span></div>

      <div class="search-row">
        <div class="search-wrapper">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder='Search movies, directors, or try "80s slasher", "movies like The Shining"…'
            autocomplete="off"
            spellcheck="false"
          >
          <div class="autocomplete-list" id="autocompleteList" style="display:none"></div>
        </div>
        <button class="search-btn" id="searchBtn" onclick="performSearch()">SEARCH</button>
      </div>

      <div class="watchlist-btn-wrap">
        <button class="watchlist-btn" onclick="showWatchlist()">
          🩸 My Watchlist <span class="watchlist-count" id="watchlistCount">0</span>
        </button>
      </div>
    </div>

    <div class="categories">
      <button class="category-btn" id="tab-top" onclick="quickSearch('top rated','tab-top')">⭐ Top Rated</button>
      <button class="category-btn" id="tab-classic" onclick="quickSearch('classic horror','tab-classic')">🎞️ Classics</button>
      <button class="category-btn" id="tab-slasher" onclick="quickSearch('slasher','tab-slasher')">🔪 Slashers</button>
      <button class="category-btn" id="tab-monster" onclick="quickSearch('monster movies','tab-monster')">🧟 Monster Movies</button>
      <button class="category-btn" id="tab-possession" onclick="quickSearch('possession horror','tab-possession')">😈 Possession</button>
      <button class="category-btn" id="tab-psycho" onclick="quickSearch('psychological horror','tab-psycho')">🧠 Psychological</button>
      <button class="category-btn" id="tab-super" onclick="quickSearch('supernatural horror','tab-super')">👁️ Supernatural</button>
      <button class="category-btn" id="tab-slowburn" onclick="quickSearch('slow burn horror','tab-slowburn')">🕯️ Slow Burn</button>
      <button class="category-btn" id="tab-intense" onclick="quickSearch('relentless horror','tab-intense')">⚡ Intense</button>
      <button class="category-btn" id="tab-gems" onclick="quickSearch('hidden gems horror','tab-gems')">💎 Hidden Gems</button>
      <button class="category-btn" id="tab-invasion" onclick="quickSearch('home invasion horror','tab-invasion')">🏠 Home Invasion</button>
      <button class="category-btn" id="tab-visual" onclick="quickSearch('visually striking horror','tab-visual')">🎨 Visually Striking</button>
      <button class="category-btn" id="tab-zombie" onclick="quickSearch('zombie horror','tab-zombie')">🧠 Zombies</button>
      <button class="category-btn" id="tab-vampire" onclick="quickSearch('vampire horror','tab-vampire')">🦇 Vampires</button>
      <button class="category-btn" id="tab-found" onclick="quickSearch('found footage horror','tab-found')">📹 Found Footage</button>
    </div>
  </div>
</div>

<div class="results-container" id="resultsContainer">
  <div class="empty-state">
    <h2>FIND YOUR NEXT FEAR</h2>
    <p>Search a title, director, or pick a category above to begin</p>
  </div>
</div>

<script>
const TMDB_API_KEY = 'e546e08d1bdccb75a8599e9177248d59';
const TMDB_BASE = 'https://api.themoviedb.org/3';
const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
const HORROR_GENRE = 27;

let watchlist = JSON.parse(localStorage.getItem('horrorWatchlist') || '[]');
let currentQuery = '';
let currentPage = 1;
let allResults = [];
let seenIds = new Set();
let isLoading = false;
let activeTab = null;

updateWatchlistCount();

// ═══════════════════════════════════════════════════════════
//  SMART SEARCH ENGINE
// ═══════════════════════════════════════════════════════════

/*
  The core idea:
  1. Normalize the query — strip articles (the, a, an), lowercase, fix misspellings
  2. Check franchise/director maps using the normalized query (so "the fly" → "fly")
  3. For a raw title search, run MULTIPLE queries:
     - with article, without article, with year variants
     - collect ALL horror results across all variants
  4. Deduplicate and rank by relevance + rating
*/

const MISSPELLINGS = {
  haloween:'halloween', holloween:'halloween', hallowen:'halloween', hallowean:'halloween',
  micheal:'michael', freddie:'freddy', kruger:'krueger', freddie:'freddy',
  exorsist:'exorcist', excorcist:'exorcist', exocist:'exorcist',
  conjering:'conjuring', conjring:'conjuring',
  insideous:'insidious', insidous:'insidious',
  paranorml:'paranormal', heriditary:'hereditary', heredatary:'hereditary',
  chuckie:'chucky', hellraser:'hellraiser',
  candymann:'candyman', poltergiest:'poltergeist',
  leaterface:'leatherface', frankenstien:'frankenstein', frankinstein:'frankenstein',
  dracular:'dracula', drakula:'dracula',
};

// Strip leading "the ", "a ", "an " for matching
function stripArticle(s) {
  return s.replace(/^(the|a|an)\s+/i, '').trim();
}

// Generate query variants to maximize recall
function queryVariants(raw) {
  const s = raw.toLowerCase().trim();
  const stripped = stripArticle(s);
  const variants = new Set([s, stripped]);
  // also try adding "the" if missing
  if (stripped === s) variants.add('the ' + s);
  return [...variants];
}

const FRANCHISE_MAP = {
  // key is normalized (no article), value is array of TMDB search strings
  'halloween': ['Halloween 1978','Halloween II 1981','Halloween III Season of the Witch','Halloween 4 Return of Michael Myers','Halloween 5 Revenge of Michael Myers','Halloween Curse of Michael Myers','Halloween H20','Halloween Resurrection','Halloween 2018','Halloween Kills','Halloween Ends','Rob Zombie Halloween 2007','Halloween II 2009'],
  'michael myers': ['Halloween 1978','Halloween II','Halloween 4','Halloween 5','Halloween H20','Halloween Kills','Halloween Ends','Halloween 2018'],
  'nightmare on elm street': ['A Nightmare on Elm Street 1984','Nightmare on Elm Street 2 Freddys Revenge','Dream Warriors Nightmare on Elm Street','Dream Master Nightmare','Dream Child Nightmare','Freddys Dead Final Nightmare',"Wes Craven's New Nightmare",'Freddy vs Jason','A Nightmare on Elm Street 2010'],
  'freddy': ['A Nightmare on Elm Street 1984','Nightmare on Elm Street 2','Dream Warriors','Dream Master Nightmare','Freddys Dead Final Nightmare','Freddy vs Jason','A Nightmare on Elm Street 2010'],
  'krueger': ['A Nightmare on Elm Street 1984','Dream Warriors','Dream Master Nightmare','Freddy vs Jason'],
  'friday the 13th': ['Friday the 13th 1980','Friday the 13th Part 2','Friday the 13th Part III','Friday the 13th Final Chapter','Friday the 13th A New Beginning','Jason Lives Friday the 13th','New Blood Friday the 13th','Jason Takes Manhattan','Jason Goes to Hell','Jason X','Freddy vs Jason','Friday the 13th 2009'],

// ─── SEARCH ENGINE ────────────────────────────────────────────────────────────

async function smartTitleSearch(rawQuery, page) {
  // Generate variants: "the fly" → ["the fly","fly"]; "fly" → ["fly","the fly"]
  const variants = queryVariants(rawQuery);
  const seen = new Set();
  const results = [];

  await Promise.all(variants.map(async v => {
    try {
      const url = `${TMDB_BASE}/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(v)}&include_adult=false&page=${page}`;
      const res = await fetch(url);
      const data = await res.json();
      for (const m of (data.results || [])) {
        if (!seen.has(m.id) && m.genre_ids && m.genre_ids.includes(HORROR_GENRE) && m.poster_path && m.vote_count >= 5) {
          seen.add(m.id);
          results.push(m);
        }
      }
    } catch(e) {}
  }));

  // Sort: exact title match first, then by vote_average × log(vote_count)
  const normQuery = stripArticle(rawQuery.toLowerCase());
  results.sort((a, b) => {
    const aTitle = stripArticle((a.title || '').toLowerCase());
    const bTitle = stripArticle((b.title || '').toLowerCase());
    const aExact = aTitle === normQuery ? 1 : 0;
    const bExact = bTitle === normQuery ? 1 : 0;
    if (aExact !== bExact) return bExact - aExact;
    // partial match bonus
    const aContains = aTitle.includes(normQuery) ? 0.5 : 0;
    const bContains = bTitle.includes(normQuery) ? 0.5 : 0;
    const aScore = (a.vote_average || 0) * Math.log10(Math.max(a.vote_count || 1, 10)) + aContains;
    const bScore = (b.vote_average || 0) * Math.log10(Math.max(b.vote_count || 1, 10)) + bContains;
    return bScore - aScore;
  });

  return results;
}

async function multiSearch(queryList) {
  const seen = new Set();
  const results = [];
  // Batch in parallel for speed, but limit concurrency
  const BATCH = 5;
  for (let i = 0; i < queryList.length; i += BATCH) {
    const batch = queryList.slice(i, i + BATCH);
    await Promise.all(batch.map(async q => {
      try {
        const variants = queryVariants(q);
        for (const v of variants) {
          const url = `${TMDB_BASE}/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(v)}&include_adult=false`;
          const res = await fetch(url);
          const data = await res.json();
          for (const m of (data.results || [])) {
            if (!seen.has(m.id) && m.genre_ids && m.genre_ids.includes(HORROR_GENRE) && m.poster_path && m.vote_count >= 5) {
              seen.add(m.id);
              results.push(m);
              break; // found for this variant, move on
            }
          }
          break; // first variant that returns results is enough
        }
      } catch(e) {}
    }));
  }
  return results;
}

async function searchMovies(query, page) {
  const raw = query.trim();
  const lower = raw.toLowerCase();
  const stripped = stripArticle(lower);

  // Correct misspellings
  let corrected = lower;
  for (const [wrong, right] of Object.entries(MISSPELLINGS)) {
    if (corrected.includes(wrong)) corrected = corrected.replace(new RegExp(wrong, 'gi'), right);
  }
  const effective = corrected;
  const effectiveStripped = stripArticle(effective);

  // ── "Similar to" / "Like" ───────────────────────────────────────────────
  const likeMatch = effective.match(/(?:movies?\s*)?(?:like|similar\s*(?:to)?)\s+(.+)/i);
  if (likeMatch) {
    return await findSimilarMovies(likeMatch[1].trim(), page);
  }

  // ── Stephen King ────────────────────────────────────────────────────────
  if (effective.includes('stephen king') || effective.includes('king movies')) {
    const url = `${TMDB_BASE}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=27&with_keywords=8739&sort_by=popularity.desc&page=${page}`;
    const res = await fetch(url);
    const data = await res.json();
    return (data.results || []).filter(m => m.poster_path && m.vote_count >= 10);
  }

  // ── Category / genre keywords ────────────────────────────────────────────
  for (const [catKey, config] of Object.entries(CATEGORY_CONFIG)) {
    if (effective.includes(catKey)) {
      return await loadCategoryPage(catKey, config, page);
    }
  }

  // ── Decade detection ─────────────────────────────────────────────────────
  const decadeMatch = effective.match(/\b(1960s?|60s|1970s?|70s|1980s?|80s|1990s?|90s|2000s?|2010s?|2020s?)\b/);
  if (decadeMatch) {
    let sy, ey;
    const dm = decadeMatch[1];
    if (dm.match(/60s|1960/)) { sy=1960; ey=1969; }
    else if (dm.match(/70s|1970/)) { sy=1970; ey=1979; }
    else if (dm.match(/80s|1980/)) { sy=1980; ey=1989; }
    else if (dm.match(/90s|1990/)) { sy=1990; ey=1999; }
    else if (dm.match(/2000/)) { sy=2000; ey=2009; }
    else if (dm.match(/2010/)) { sy=2010; ey=2019; }
    else if (dm.match(/2020/)) { sy=2020; ey=2029; }
    if (sy) {
      const url = `${TMDB_BASE}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=27&primary_release_date.gte=${sy}-01-01&primary_release_date.lte=${ey}-12-31&sort_by=vote_average.desc&vote_count.gte=50&page=${page}`;
      const res = await fetch(url);
      const data = await res.json();
      return (data.results || []).filter(m => m.poster_path && m.vote_count >= 10);
    }
  }

  // ── Director match ───────────────────────────────────────────────────────
  for (const [dirKey, films] of Object.entries(DIRECTOR_MAP)) {
    if (effective.includes(dirKey)) {
      if (page === 1) return await multiSearch(films);
      const url = `${TMDB_BASE}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=27&sort_by=popularity.desc&page=${page}`;
      const res = await fetch(url);
      const data = await res.json();
      return (data.results || []).filter(m => m.poster_path && m.vote_count >= 10);
    }
  }

  // ── Franchise match — use BOTH the raw and stripped query ───────────────
  // This is the key fix: "the fly" strips to "fly" → matches franchise key "fly"
  let bestFranchiseKey = null;
  let bestLen = 0;
  for (const key of Object.keys(FRANCHISE_MAP)) {
    if ((effective.includes(key) || effectiveStripped.includes(key)) && key.length > bestLen) {
      bestFranchiseKey = key;
      bestLen = key.length;
    }
  }

  if (bestFranchiseKey) {
    if (page === 1) {
      const results = await multiSearch(FRANCHISE_MAP[bestFranchiseKey]);
      results.sort((a, b) => (a.release_date || '').localeCompare(b.release_date || ''));
      return results;
    } else {
      // Load more: search TMDB for title variants to get extra entries
      const allExtra = [];
      const seen2 = new Set();
      for (const q of FRANCHISE_MAP[bestFranchiseKey]) {
        const variants = queryVariants(q);
        for (const v of variants) {
          try {
            const url = `${TMDB_BASE}/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(v)}&page=${page}`;
            const res = await fetch(url);
            const data = await res.json();
            for (const m of (data.results || [])) {
              if (!seen2.has(m.id) && m.genre_ids && m.genre_ids.includes(HORROR_GENRE) && m.poster_path) {
                seen2.add(m.id);
                allExtra.push(m);
              }
            }
          } catch(e) {}
        }
      }
      return allExtra;
    }
  }

  // ── General title search — smart multi-variant ───────────────────────────
  const titleResults = await smartTitleSearch(effective, page);
  if (titleResults.length > 0) return titleResults;

  // ── Fallback: popular horror ─────────────────────────────────────────────
  const url = `${TMDB_BASE}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=27&sort_by=popularity.desc&vote_count.gte=50&page=${page}`;
  const res = await fetch(url);
  const data = await res.json();
  return (data.results || []).filter(m => m.poster_path && m.vote_count >= 10);
}

// ─── CATEGORY LOADER ──────────────────────────────────────────────────────────

async function loadCategoryPage(catKey, config, page) {
  if (page === 1) {
    const curated = await multiSearch(config.curated || []);

    let discover = [];
    if (config.discover) {
      try {
        const res = await fetch(config.discover);
        const data = await res.json();
        const existing = new Set(curated.map(m => m.id));
        discover = (data.results || []).filter(m =>
          m.genre_ids && m.genre_ids.includes(HORROR_GENRE) &&
          m.poster_path && m.vote_count >= 10 && !existing.has(m.id)
        );
      } catch(e) {}
    }

    let combined = [...curated, ...discover];

    // For monster movies: deduplicate by series to avoid 10 Frankenstein in a row
    if (config.dedupByTitle) {
      const seriesKeywords = ['frankenstein','dracula','mummy','wolf man','wolfman','creature'];
      const seriesSeen = {};
      combined = combined.filter(m => {
        const t = (m.title || '').toLowerCase();
        for (const kw of seriesKeywords) {
          if (t.includes(kw)) {
            seriesSeen[kw] = (seriesSeen[kw] || 0) + 1;
            if (seriesSeen[kw] > 2) return false; // max 2 per series in tab view
          }
        }
        return true;
      });
    }

    return Array.from(new Map(combined.map(m => [m.id, m])).values());
  } else {
    if (config.discover) {
      try {
        const url = config.discover + `&page=${page}`;
        const res = await fetch(url);
        const data = await res.json();
        return (data.results || []).filter(m =>
          m.genre_ids && m.genre_ids.includes(HORROR_GENRE) &&
          m.poster_path && m.vote_count >= 10
        );
      } catch(e) { return []; }
    }
    return [];
  }
}

async function findSimilarMovies(movieName, page) {
  try {
    const variants = queryVariants(movieName);
    let movieId = null;
    for (const v of variants) {
      const res = await fetch(`${TMDB_BASE}/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(v)}`);
      const data = await res.json();
      const horror = (data.results || []).find(m => m.genre_ids && m.genre_ids.includes(HORROR_GENRE));
      if (horror) { movieId = horror.id; break; }
      if (data.results && data.results[0]) { movieId = data.results[0].id; break; }
    }
    if (!movieId) return [];
    const simRes = await fetch(`${TMDB_BASE}/movie/${movieId}/similar?api_key=${TMDB_API_KEY}&page=${page}`);
    const simData = await simRes.json();
    return (simData.results || []).filter(m => m.genre_ids && m.genre_ids.includes(HORROR_GENRE) && m.poster_path);
  } catch(e) { return []; }
}

// ═══════════════════════════════════════════════════════════
//  UI FUNCTIONS
// ═══════════════════════════════════════════════════════════

async function performSearch(loadMore = false) {
  const input = document.getElementById('searchInput');
  const query = loadMore ? currentQuery : input.value.trim();
  if (!query || isLoading) return;

  hideAutocomplete();

  if (!loadMore) {
    currentQuery = query;
    currentPage = 1;
    allResults = [];
    seenIds = new Set();
    clearActiveTabs();
  }

  isLoading = true;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;

  const container = document.getElementById('resultsContainer');

  if (!loadMore) {
    container.innerHTML = '<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
  } else {
    const lmBtn = container.querySelector('.load-more-btn');
    if (lmBtn) lmBtn.textContent = '⏳ Loading…';
  }

  try {
    const movies = await searchMovies(currentQuery, currentPage);
    const newMovies = movies.filter(m => !seenIds.has(m.id));
    newMovies.forEach(m => seenIds.add(m.id));
    allResults = [...allResults, ...newMovies];
    const hasMore = newMovies.length >= 4;
    renderResults(allResults, currentQuery, hasMore);
    currentPage++;
  } catch(e) {
    container.innerHTML = '<div class="empty-state"><h2>😱 Something went wrong</h2><p>Check your connection and try again.</p></div>';
  }

  btn.disabled = false;
  isLoading = false;
}

function quickSearch(query, tabId) {
  document.getElementById('searchInput').value = query;
  currentPage = 1;
  allResults = [];
  seenIds = new Set();
  clearActiveTabs();
  if (tabId) {
    const el = document.getElementById(tabId);
    if (el) el.classList.add('active');
    activeTab = tabId;
  }
  performSearch();
}

function clearActiveTabs() {
  document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
  activeTab = null;
}

function renderResults(movies, query, canLoadMore) {
  const container = document.getElementById('resultsContainer');
  if (!movies.length) {
    container.innerHTML = '<div class="empty-state"><h2>NO RESULTS FOUND</h2><p>Try a different search term — check spelling or use broader keywords.</p></div>';
    return;
  }

  let html = `<div class="results-header">Showing <strong>${movies.length}</strong> horror movie${movies.length !== 1 ? 's' : ''} for <strong>"${escHtml(query)}"</strong></div>`;
  html += '<div class="movies-grid">';

  for (const m of movies) {
    const year = m.release_date ? m.release_date.slice(0,4) : '—';
    const rating = m.vote_average ? m.vote_average.toFixed(1) : '—';
    const isFav = watchlist.some(w => w.id === m.id);
    const topRated = m.vote_average >= 7.5 && m.vote_count >= 200;
    const safeTitle = (m.title || '').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    const safePoster = (m.poster_path || '').replace(/'/g,"\\'");

    html += `
      <div class="movie-card" id="card-${m.id}">
        <div class="poster-wrap">
          ${m.poster_path
            ? `<img src="${IMG_BASE}${m.poster_path}" alt="${escHtml(m.title)}" loading="lazy">`
            : '<div class="poster-placeholder">&#127916;</div>'}
          <button class="fav-btn ${isFav ? 'active' : ''}"
            onclick="toggleFav(${m.id},'${safeTitle}','${safePoster}',${m.vote_average||0},'${year}',event)">
            ${isFav ? '&#10084;' : '&#9825;'}
          </button>
        </div>
        <div class="movie-info">
          <div class="movie-title">${escHtml(m.title)}</div>
          <div class="rating-row">
            <span class="rating-score">&#9733; ${rating}</span>
          </div>
          <div class="movie-meta">
            <span>${year}</span>
            <span>&middot;</span>
            <span>${m.vote_count ? m.vote_count.toLocaleString() + ' votes' : ''}</span>
          </div>
          <div class="movie-overview">${escHtml(m.overview || 'No description available.')}</div>
          ${topRated ? '<div class="top-rated-badge">&#9733; Top Rated</div>' : ''}
        </div>
        <div class="streaming-section">
          <div class="streaming-label">Where to Watch</div>
          <div class="streaming-providers" id="stream-${m.id}">
            <span class="provider-loading">Loading...</span>
          </div>
        </div>
      </div>`;
  }

  html += '</div>';

  if (canLoadMore) {
    html += '<button class="load-more-btn" onclick="performSearch(true)">LOAD MORE MOVIES</button>';
  }

  container.innerHTML = html;

  // Fetch streaming providers for all visible movies in batches (avoid rate limits)
  fetchStreamingProvidersBatch(movies);
}

async function fetchStreamingProvidersBatch(movies) {
  const BATCH_SIZE = 6;
  for (let i = 0; i < movies.length; i += BATCH_SIZE) {
    const batch = movies.slice(i, i + BATCH_SIZE);
    await Promise.all(batch.map(m => fetchAndInjectProviders(m.id)));
    // Small delay between batches to be kind to the API
    if (i + BATCH_SIZE < movies.length) {
      await new Promise(r => setTimeout(r, 120));
    }
  }
}

async function fetchAndInjectProviders(movieId) {
  const el = document.getElementById(`stream-${movieId}`);
  if (!el) return;
  try {
    const res = await fetch(`${TMDB_BASE}/movie/${movieId}/watch/providers?api_key=${TMDB_API_KEY}`);
    const data = await res.json();
    // Try US first, then fall back to first available country
    const regions = data.results || {};
    let providerData = regions['US'];
    if (!providerData) {
      const firstKey = Object.keys(regions)[0];
      if (firstKey) providerData = regions[firstKey];
    }

    // Prefer flatrate (subscription), then free, then ads, then rent
    const providers = providerData
      ? (providerData.flatrate || providerData.free || providerData.ads || providerData.rent || [])
      : [];

    if (!providers.length) {
      el.innerHTML = '<span class="provider-none">No streaming found</span>';
      return;
    }

    // Dedupe by provider_id and cap at 5 logos
    const seen = new Set();
    const unique = providers.filter(p => {
      if (seen.has(p.provider_id)) return false;
      seen.add(p.provider_id);
      return true;
    }).slice(0, 5);

    el.innerHTML = unique.map(p =>
      p.logo_path
        ? `<img class="provider-logo" src="https://image.tmdb.org/t/p/original${p.logo_path}" alt="${escHtml(p.provider_name)}" title="${escHtml(p.provider_name)}">`
        : `<span class="provider-tag">${escHtml(p.provider_name)}</span>`
    ).join('');

  } catch(e) {
    if (el) el.innerHTML = '<span class="provider-none">No streaming found</span>';
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── WATCHLIST ────────────────────────────────────────────────────────────────

function toggleFav(id, title, poster, rating, year, event) {
  event.stopPropagation();
  const idx = watchlist.findIndex(w => w.id === id);
  if (idx > -1) watchlist.splice(idx, 1);
  else watchlist.push({ id, title, poster, rating, year });
  localStorage.setItem('horrorWatchlist', JSON.stringify(watchlist));
  updateWatchlistCount();

  // Update just the button
  const btn = event.currentTarget;
  const isNowFav = idx === -1;
  btn.textContent = isNowFav ? '❤' : '♡';
  btn.classList.toggle('active', isNowFav);
}

function updateWatchlistCount() {
  document.getElementById('watchlistCount').textContent = watchlist.length;
}

function showWatchlist() {
  clearActiveTabs();
  document.getElementById('searchInput').value = '';
  const container = document.getElementById('resultsContainer');
  if (!watchlist.length) {
    container.innerHTML = '<div class="empty-state"><h2>WATCHLIST EMPTY</h2><p>Click ♡ on any movie to add it here.</p></div>';
    return;
  }
  let html = `<div class="results-header">My Watchlist — <strong>${watchlist.length}</strong> movie${watchlist.length !== 1 ? 's' : ''}</div>`;
  html += '<div class="movies-grid">';
  for (const m of watchlist) {
    const safeTitle = (m.title || '').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    const ratingVal = m.rating ? parseFloat(m.rating) : 0;
    html += `
      <div class="movie-card" id="card-${m.id}">
        <div class="poster-wrap">
          ${m.poster
            ? `<img src="${IMG_BASE}${m.poster}" alt="${escHtml(m.title)}" loading="lazy">`
            : '<div class="poster-placeholder">&#127916;</div>'}
          <button class="fav-btn active" onclick="toggleFav(${m.id},'${safeTitle}','${m.poster||''}',${m.rating||0},'${m.year}',event)">&#10084;</button>
        </div>
        <div class="movie-info">
          <div class="movie-title">${escHtml(m.title)}</div>
          <div class="rating-row">
            <span class="rating-score">&#9733; ${ratingVal ? ratingVal.toFixed(1) : '—'}</span>
          </div>
          <div class="movie-meta"><span>${m.year}</span></div>
        </div>
        <div class="streaming-section">
          <div class="streaming-label">Where to Watch</div>
          <div class="streaming-providers" id="stream-${m.id}">
            <span class="provider-loading">Loading...</span>
          </div>
        </div>
      </div>`;
  }
  html += '</div>';
  container.innerHTML = html;
  fetchStreamingProvidersBatch(watchlist.map(m => ({ id: m.id })));
}

// ─── AUTOCOMPLETE ─────────────────────────────────────────────────────────────

let acTimer = null;
const searchInput = document.getElementById('searchInput');

searchInput.addEventListener('input', () => {
  clearTimeout(acTimer);
  const val = searchInput.value.trim();
  if (val.length < 2) { hideAutocomplete(); return; }
  acTimer = setTimeout(() => fetchAutocomplete(val), 280);
});

searchInput.addEventListener('keydown', e => {
  const list = document.getElementById('autocompleteList');
  const items = list.querySelectorAll('.autocomplete-item');
  const selected = list.querySelector('.selected');
  let idx = [...items].indexOf(selected);

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (idx < items.length - 1) { if (selected) selected.classList.remove('selected'); items[idx+1].classList.add('selected'); }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (idx > 0) { if (selected) selected.classList.remove('selected'); items[idx-1].classList.add('selected'); }
  } else if (e.key === 'Enter') {
    if (selected) { selected.click(); }
    else { performSearch(); }
  } else if (e.key === 'Escape') { hideAutocomplete(); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrapper')) hideAutocomplete();
});

async function fetchAutocomplete(q) {
  try {
    const variants = queryVariants(q);
    const seen = new Set();
    const results = [];
    for (const v of variants) {
      const res = await fetch(`${TMDB_BASE}/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(v)}&include_adult=false`);
      const data = await res.json();
      for (const m of (data.results || [])) {
        if (!seen.has(m.id) && m.genre_ids && m.genre_ids.includes(HORROR_GENRE) && m.poster_path) {
          seen.add(m.id);
          results.push(m);
          if (results.length >= 8) break;
        }
      }
      if (results.length >= 8) break;
    }

    results.sort((a,b) => (b.vote_count||0) - (a.vote_count||0));
    showAutocomplete(results.slice(0,6));
  } catch(e) {}
}

function showAutocomplete(movies) {
  const list = document.getElementById('autocompleteList');
  if (!movies.length) { hideAutocomplete(); return; }
  list.innerHTML = movies.map(m => {
    const year = m.release_date ? m.release_date.slice(0,4) : '';
    return `<div class="autocomplete-item" onclick="selectAutocomplete('${escHtml(m.title).replace(/'/g,"\\'")}')">
      🎬 ${escHtml(m.title)} <span class="ac-year">${year}</span>
    </div>`;
  }).join('');
  list.style.display = 'block';
}

function hideAutocomplete() {
  document.getElementById('autocompleteList').style.display = 'none';
}

function selectAutocomplete(title) {
  searchInput.value = title;
  hideAutocomplete();
  performSearch();
}
</script>
